<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ share_title }}</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ share_title }}">
    <meta property="og:description" content="{{ share_description }}">
    <meta property="og:image" content="{{ card_url }}">
    <meta property="og:image:secure_url" content="{{ card_url }}">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ share_title }}">
    <meta name="twitter:description" content="{{ share_description }}">
    <meta name="twitter:image" content="{{ card_url }}">
    <style>
        body {
            background: #0f2430;
            color: #f4f7f8;
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            max-width: 520px;
            width: 100%;
            background: rgba(6, 14, 20, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
        }
        .card img {
            display: block;
            width: 100%;
            height: auto;
        }
        .copy {
            padding: 18px 20px 22px;
        }
        .copy h1 {
            font-size: 1.25rem;
            margin: 0 0 0.65rem;
        }
        .copy p {
            color: #d4dee2;
            margin: 0;
        }
    </style>
</head>
<body>
    <article class="card">
        <img src="{{ card_url }}" alt="Tarjeta del acceso">
        <div class="copy">
            <h1>{{ share_title }}</h1>
            <p>{{ share_description }}</p>
        </div>
    </article>
</body>
</html>
